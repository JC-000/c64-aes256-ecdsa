# =============================================================================
# linker.cfg - ld65 linker configuration for the c64-aes256-ecdsa ca65 port
#
# Reproduces the memory layout the ACME build has used historically:
#   - BASIC-stub load at $0801 (SYS-into-code trick, see src/boot.asm)
#   - A fixed, page-aligned 1KB "quarter-square" table zone at $7800-$7BFF,
#     reserved/unused by the linker (the real table is built at RUNTIME by
#     fp_init_sqtab; this config just guarantees no other segment can ever
#     be placed on top of it)
#   - A general low-memory area ($0801-$77FF) for the bulk of CODE/RODATA/DATA
#   - A high-memory overflow area ($7C00-$CFFF) for any module too large to
#     fit before the quarter-square zone, mirroring the ACME source's
#     historical "* = $7C00" placement for newer/larger modules
#   - A zeropage layout that reserves the project's existing fixed zero-page
#     map and exposes the remaining genuinely-free C64 zero-page bytes as
#     three explicitly-named segments so future ca65 code can allocate zero
#     page without colliding with the project's existing hand-assigned
#     addresses. The full occupancy map, cross-checked directly against
#     every zero-page equate actually defined in src/*.s (constants.s,
#     ecdsa_fp.s, ecdsa_points.s), not just HANDOFF.md's summary table:
#       $00-$01  6510 CPU port (hardware data-direction/data registers) - NEVER free
#       $02-$09  USED: zp_ptr2($02-03), zp_round($04), zp_col($05), zp_tmp1-4($06-09)
#       $0A-$12  USED: sha_temp1($0A-0D), sha_temp2($0E-11), sha256_round($12)
#       $13-$21  free (15 bytes) -> ZP2
#       $22-$2B  USED: fp_src1/fp_src2/fp_dst/fp_misc($22-29), fp_carry($2A), fp_loop($2B)
#       $2C-$38  free (13 bytes) -> ZP3
#       $39-$3C  USED: fp_mul_i($39), fp_mul_j($3A), ec_scalar_ptr($3B-3C)
#       $3D-$8F  free (83 bytes) -> ZEROPAGE (default .zeropage target)
#       $90-$FA  KERNAL/BASIC working storage - not free for user code, left out
#       $FB-$FE  USED: zp_ptr($FB-FC), zp_temp($FD), zp_count($FE)
#       $FF      conventionally avoided, left out
#     NOTE: an earlier version of this config claimed $02-$09 ("ZP1") was also
#     free - that was WRONG (found in code review): all 8 of those bytes are
#     live AES-path variables. ZP1 has been removed entirely rather than
#     shrunk, since there is no genuinely free byte left in that range.
# =============================================================================

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    # --- Zero page: three genuinely-free chunks, holes left where the
    #     project's fixed zero-page map already lives (see occupancy map
    #     above; $02-$09 is NOT free, so there is no ZP1 here) ---
    ZP2: file = "", define = yes, start = $0013, size = $000F; # $13-$21 (15 bytes)
    ZP3: file = "", define = yes, start = $002C, size = $000D; # $2C-$38 (13 bytes)
    ZP4: file = "", define = yes, start = $003D, size = $0053; # $3D-$8F (83 bytes)

    # --- Header: 2-byte PRG load-address, always $0801 ---
    LOADADDR: file = %O, start = %S - 2, size = $0002;

    # --- Low memory: BASIC stub + bulk of code/data, up to (not incl.) $7800 ---
    # fill=yes is REQUIRED here: a .prg is a flat, address-contiguous byte
    # stream with no ability to "jump" the load cursor forward, so if
    # anything is ever placed in QSTAB or HIMEM below, the file itself must
    # physically contain filler bytes for every address in between or those
    # later segments will land at the wrong file offset (i.e. the wrong
    # in-memory address once loaded). This mirrors what ACME's own "* = X"
    # forward jump does under the hood when producing a single cbm/plain
    # output file.
    MAIN:  file = %O, define = yes, start = %S, size = $7800 - %S, fill = yes;

    # --- Quarter-square multiply table zone: reserved, page-aligned, 1KB.
    #     In the real port nothing is ever loaded here from disk - the table
    #     is built at runtime by fp_init_sqtab. We still model it as a real
    #     MEMORY area (rather than just a gap) so a segment CAN be aligned
    #     and placed here, which is what proves the alignment constraint in
    #     the pilot's synthetic test program. fill=yes for the same reason
    #     as MAIN, in case HIMEM is ever used but QSTAB's segment is not. ---
    QSTAB: file = %O, define = yes, start = $7800, size = $0400, fill = yes;

    # --- High memory overflow area for modules too large to fit in MAIN,
    #     mirroring the ACME source's "* = $7C00" placement technique.
    #     Upper bound $CFFF keeps clear of the $D000 I/O area. ---
    HIMEM: file = %O, define = yes, start = $7C00, size = $D000 - $7C00;
}

SEGMENTS {
    ZEROPAGE: load = ZP4, type = zp, optional = yes, define = yes; # default .zeropage target (largest free chunk)
    ZP2:      load = ZP2, type = zp, optional = yes, define = yes;
    ZP3:      load = ZP3, type = zp, optional = yes, define = yes;

    LOADADDR: load = LOADADDR, type = ro;

    STARTUP:  load = MAIN, type = ro, optional = yes;
    CODE:     load = MAIN, type = ro, optional = yes;
    RODATA:   load = MAIN, type = ro, optional = yes;
    DATA:     load = MAIN, type = rw, optional = yes;
    BSS:      load = MAIN, type = bss, optional = yes, define = yes;

    QSTAB:    load = QSTAB, type = rw, optional = yes, align = $100;

    HICODE:   load = HIMEM, type = ro, optional = yes;
    HIRODATA: load = HIMEM, type = ro, optional = yes;
    HIDATA:   load = HIMEM, type = rw, optional = yes;
}
